<mat-card class="deal-card">
  <a [routerLink]="['/product', productId]" class="product-link">
    <div class="img-container">
      <img mat-card-image [src]="image" [alt]="title | titlecase" />
    </div>

    <mat-card-content>
      <h2>{{ title | titlecase | slice:0:20 }}</h2>
      <p>{{ desc | slice:0:30 }}…</p> <!-- cut first 30 chars -->
    </mat-card-content>
  </a>

  <mat-card-actions>
    <p class="price">{{ price | currency:'USD':'code' }}</p>
  </mat-card-actions>
</mat-card>
